<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>Excessorize</title>
  <meta name="description" content="You already own the right pieces. Excessorize helps you actually use them." />
  <meta name="theme-color" content="#F3F0EA" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#211F1C" media="(prefers-color-scheme: dark)" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Excessorize" />
  <link rel="stylesheet" href="app.css" />
</head>
<body>
  <div id="app">
    <!-- TODAY -->
    <section class="screen" id="screen-today">
      <div class="top">
        <div>
          <h1 class="large">Today</h1>
          <div class="subtitle" id="today-date"></div>
        </div>
        <div class="top-actions">
          <button class="btn primary small" data-nav="style">Style an outfit</button>
        </div>
      </div>
      <div id="today-content"></div>
    </section>

    <!-- CLOSET -->
    <section class="screen" id="screen-closet">
      <div class="top">
        <div>
          <h1 class="large">Closet</h1>
          <div class="subtitle" id="closet-count"></div>
        </div>
        <div class="top-actions">
          <button class="btn primary small" id="btn-add-item">+ Add piece</button>
        </div>
      </div>
      <div class="chips scroll" id="closet-filters"></div>
      <div id="closet-content"></div>
    </section>

    <!-- STYLE -->
    <section class="screen" id="screen-style">
      <div class="top">
        <div>
          <h1 class="large">Stylist</h1>
          <div class="subtitle">Snap your outfit, style from your closet</div>
        </div>
      </div>
      <div id="style-content"></div>
    </section>

    <!-- LOOKS -->
    <section class="screen" id="screen-looks">
      <div class="top">
        <div>
          <h1 class="large">Looks</h1>
          <div class="subtitle" id="looks-count"></div>
        </div>
      </div>
      <div id="looks-content"></div>
    </section>
  </div>

  <!-- tab bar -->
  <nav class="tabbar" id="tabbar">
    <button data-nav="today" aria-label="Today">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/></svg>
      Today
    </button>
    <button data-nav="closet" aria-label="Closet">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3.5" y="3.5" width="17" height="17" rx="3"/><path d="M12 3.5v17M3.5 12h17"/></svg>
      Closet
    </button>
    <button data-nav="style" aria-label="Stylist">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l1.9 5.3L19 10l-5.1 1.7L12 17l-1.9-5.3L5 10l5.1-1.7z"/><path d="M19 16l.8 2.2L22 19l-2.2.8L19 22l-.8-2.2L16 19l2.2-.8z"/></svg>
      Stylist
    </button>
    <button data-nav="looks" aria-label="Looks">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20s-7-4.3-9.2-8.5C1.2 8 3 5 6.2 5c2 0 3.4 1.1 4.1 2.2h3.4C14.4 6.1 15.8 5 17.8 5 21 5 22.8 8 21.2 11.5 19 15.7 12 20 12 20z" transform="scale(.92) translate(1 .5)"/></svg>
      Looks
    </button>
  </nav>

  <!-- generic bottom sheet -->
  <div class="sheet-wrap" id="sheet-wrap">
    <div class="scrim" id="sheet-scrim"></div>
    <div class="sheet" id="sheet">
      <div class="grabber"></div>
      <div id="sheet-body"></div>
    </div>
  </div>

  <!-- hidden photo inputs: capture=environment opens the iPhone camera directly -->
  <input type="file" accept="image/*" capture="environment" id="input-camera" hidden />
  <input type="file" accept="image/*" id="input-library" hidden />

  <script src="engine.js"></script>
  <script src="db.js"></script>
  <script src="vision.js"></script>
  <script src="seed.js"></script>
  <script src="app.js"></script>
</body>
</html>
