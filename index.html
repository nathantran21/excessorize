<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>Excessorize</title>
  <meta name="description" content="You already own the right pieces. Excessorize helps you actually use them." />
  <meta name="theme-color" content="#0C0B09" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Excessorize" />
  <link rel="stylesheet" href="app.css" />
</head>
<body>
  <div id="app">
    <!-- TODAY -->
    <section class="screen" id="screen-today">
      <div class="top">
        <div>
          <div class="eyebrow" id="today-greet">Good evening</div>
          <h1 class="large">Today</h1>
          <div class="subtitle" id="today-date"></div>
        </div>
      </div>
      <div id="today-content"></div>
    </section>

    <!-- CLOSET -->
    <section class="screen" id="screen-closet">
      <div class="top">
        <div>
          <h1 class="large">Closet</h1>
          <div class="subtitle" id="closet-count"></div>
        </div>
        <div class="top-actions">
          <button class="btn primary small" id="btn-add-item">+ Add piece</button>
        </div>
      </div>
      <div class="seg-row">
        <div class="search" style="flex:1;margin-top:0">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><circle cx="10.8" cy="10.8" r="6.3"/><path d="M15.6 15.6 20.5 20.5"/></svg>
          <input type="search" id="closet-search" placeholder="Search pieces, colors…" autocomplete="off" />
        </div>
        <button class="icon-btn" id="btn-closet-sort" aria-label="Sort closet">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M7 4.5v15M7 19.5 3.8 16M7 19.5l3.2-3.5"/><path d="M17 19.5v-15M17 4.5 13.8 8M17 4.5l3.2 3.5"/></svg>
        </button>
      </div>
      <div class="chips scroll" id="closet-filters"></div>
      <div id="closet-content"></div>
    </section>

    <!-- STYLIST -->
    <section class="screen" id="screen-style">
      <div class="top">
        <div>
          <h1 class="large">Stylist</h1>
          <div class="subtitle">Snap your outfit, style from your closet</div>
        </div>
      </div>
      <div id="style-content"></div>
    </section>

    <!-- LOOKS -->
    <section class="screen" id="screen-looks">
      <div class="top">
        <div>
          <h1 class="large">Looks</h1>
          <div class="subtitle" id="looks-count"></div>
        </div>
        <div class="top-actions">
          <button class="icon-btn" id="btn-looks-sort" aria-label="Sort looks">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M7 4.5v15M7 19.5 3.8 16M7 19.5l3.2-3.5"/><path d="M17 19.5v-15M17 4.5 13.8 8M17 4.5l3.2 3.5"/></svg>
          </button>
        </div>
      </div>
      <div class="search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><circle cx="10.8" cy="10.8" r="6.3"/><path d="M15.6 15.6 20.5 20.5"/></svg>
        <input type="search" id="looks-search" placeholder="Search looks, pieces…" autocomplete="off" />
      </div>
      <div class="chips scroll" id="looks-filters"></div>
      <div id="looks-content"></div>
    </section>

    <!-- PROFILE -->
    <section class="screen" id="screen-profile">
      <div class="top">
        <div>
          <h1 class="large">Profile</h1>
          <div class="subtitle">Your taste, your data</div>
        </div>
      </div>
      <div id="profile-content"></div>
    </section>
  </div>

  <!-- tab bar (icons injected by app.js) -->
  <nav class="tabbar" id="tabbar">
    <button data-nav="today" aria-label="Today">Today</button>
    <button data-nav="closet" aria-label="Closet">Closet</button>
    <button data-nav="style" aria-label="Stylist">Stylist</button>
    <button data-nav="looks" aria-label="Looks">Looks</button>
    <button data-nav="profile" aria-label="Profile">Profile</button>
  </nav>

  <!-- onboarding layer -->
  <div class="ob-wrap" id="ob-wrap" style="display:none"><div class="ob" id="ob"></div></div>

  <!-- generic bottom sheet -->
  <div class="sheet-wrap" id="sheet-wrap">
    <div class="scrim" id="sheet-scrim"></div>
    <div class="sheet" id="sheet">
      <div class="grabber"></div>
      <div id="sheet-body"></div>
    </div>
  </div>

  <!-- hidden inputs: capture=environment opens the iPhone camera directly -->
  <input type="file" accept="image/*" capture="environment" id="input-camera" hidden />
  <input type="file" accept="image/*" id="input-library" hidden />
  <input type="file" accept="application/json,.json" id="input-import" hidden />

  <script src="engine.js"></script>
  <script src="db.js"></script>
  <script src="vision.js"></script>
  <script src="seed.js"></script>
  <script src="app.js"></script>
</body>
</html>
